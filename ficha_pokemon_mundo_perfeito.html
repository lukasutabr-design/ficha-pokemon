<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Mundo Perfeito — Fichas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --red:      #E3350D;
    --red-dark: #B02B0A;
    --yellow:   #F7C331;
    --blue:     #2A75BB;
    --blue-light:#4A9BE8;
    --dark:     #1A1A2E;
    --card:     #16213E;
    --surface:  #0F3460;
    --text:     #E8EAF6;
    --muted:    #8892B0;
    --border:   #2D3561;
    --green:    #22C55E;
    --radius:   10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Nunito', sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── HEADER ── */
  .app-header {
    background: linear-gradient(135deg, var(--red-dark) 0%, var(--red) 50%, #FF6B35 100%);
    padding: 12px 20px; display: flex; align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--yellow);
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  .app-title { font-family:'Press Start 2P',monospace; font-size:10px; color:#fff; text-shadow:2px 2px 0 #000; line-height:1.6; }
  .app-title span { color:var(--yellow); }
  .pokeball { width:36px;height:36px;background:conic-gradient(#fff 180deg,var(--red) 180deg);border-radius:50%;border:3px solid #222;position:relative;flex-shrink:0; }
  .pokeball::before{content:'';position:absolute;top:50%;left:0;right:0;height:3px;background:#222;transform:translateY(-50%);}
  .pokeball::after{content:'';position:absolute;top:50%;left:50%;width:10px;height:10px;background:#fff;border-radius:50%;border:3px solid #222;transform:translate(-50%,-50%);}

  /* ── LAYOUT ── */
  .app-body { display:flex; height:calc(100vh - 70px); }
  .sidebar { width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto; }
  .sb-section { padding:12px; border-bottom:1px solid var(--border); }
  .sb-label { font-family:'Press Start 2P',monospace;font-size:7px;color:var(--yellow);margin-bottom:8px;text-transform:uppercase; }
  .sb-btn { width:100%;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-align:left;margin-bottom:4px;transition:all .15s; }
  .sb-btn:hover { background:var(--blue);border-color:var(--blue-light); }
  .sb-btn.active { background:var(--blue);border-color:var(--blue-light);color:#fff; }
  .sb-btn.t-btn { border-left:3px solid var(--yellow); }
  .sb-btn.p-btn { border-left:3px solid var(--green); }
  .btn-add { padding:8px;background:var(--red);border:none;border-radius:var(--radius);color:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;width:100%;margin-bottom:4px;transition:background .15s; }
  .btn-add:hover { background:var(--red-dark); }
  .btn-add.g { background:#166534; }
  .btn-add.g:hover { background:#15803D; }
  .main { flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--surface) var(--dark); }

  /* ── CARDS ── */
  .card { background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px; }
  .card-title { font-family:'Press Start 2P',monospace;font-size:8px;color:var(--yellow);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);text-transform:uppercase; }
  .section-label { font-size:11px;font-weight:800;color:var(--blue-light);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.5px; }

  /* ── FORMS ── */
  .fg { display:flex;flex-direction:column;gap:4px; }
  .fg label { font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px; }
  .fg input,.fg select,.fg textarea { background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border .15s; }
  .fg input:focus,.fg select:focus,.fg textarea:focus { border-color:var(--blue-light); }
  .fg textarea { resize:vertical;min-height:70px; }
  .fg select option { background:var(--dark); }
  .grid { display:grid;gap:10px; }
  .g2 { grid-template-columns:repeat(2,1fr); }
  .g3 { grid-template-columns:repeat(3,1fr); }
  .g4 { grid-template-columns:repeat(4,1fr); }
  .gauto { grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); }
  .gauto-wide { grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); }

  /* ── ATRIBUTOS ── */
  .attr-grid { display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:8px; }
  .attr-box { background:var(--surface);border:1px solid var(--border);border-radius:10px;text-align:center;padding:10px 6px; }
  .attr-box label { display:block;font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-bottom:4px; }
  .attr-box input { width:100%;background:transparent;border:none;border-bottom:2px solid var(--border);color:var(--yellow);font-family:'Press Start 2P',monospace;font-size:14px;text-align:center;outline:none;padding:2px 0; }
  .attr-box input:focus { border-bottom-color:var(--yellow); }
  .attr-mod { font-size:11px;font-weight:700;color:var(--blue-light);margin-top:4px; }

  /* ── PONTOS ── */
  .points-bar { background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:10px; }
  .points-row { display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700; }
  .pts-label { color:var(--muted); }
  .pts-val { font-family:'Press Start 2P',monospace;font-size:10px; }
  .pts-val.ok { color:var(--green); }
  .pts-val.warn { color:var(--yellow); }
  .pts-val.over { color:var(--red); }
  .pts-info { font-size:11px;color:var(--muted);margin-top:4px; }

  /* ── HP BAR ── */
  .hp-row { display:flex;align-items:center;gap:12px;margin-bottom:10px; }
  .hp-inputs { display:flex;align-items:center;gap:4px; }
  .hp-inputs input { width:60px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;text-align:center;padding:4px;outline:none; }
  .hp-sep { font-size:16px;color:var(--muted); }
  .hp-bar-wrap { flex:1;height:12px;background:var(--surface);border-radius:6px;overflow:hidden; }
  .hp-bar-fill { height:100%;border-radius:6px;transition:width .3s,background .3s; }
  .hp-label { font-size:10px;font-weight:800;color:var(--muted);min-width:24px; }

  /* ── DERIVED STATS ── */
  .derived-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px; }
  .derived-box { background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center; }
  .derived-box .d-label { font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-bottom:4px; }
  .derived-box .d-val { font-family:'Press Start 2P',monospace;font-size:13px;color:var(--yellow); }
  .derived-box .d-formula { font-size:9px;color:var(--muted);margin-top:3px; }

  /* ── PERÍCIAS ── */
  .skills-grid { display:grid;grid-template-columns:1fr 1fr;gap:4px; }
  .skill-row { display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;background:var(--surface);border:1px solid transparent; }
  .skill-row:hover { border-color:var(--border); }
  .skill-row input[type="checkbox"] { accent-color:var(--yellow);width:14px;height:14px;cursor:pointer;flex-shrink:0; }
  .skill-name { flex:1;font-size:12px;font-weight:600; }
  .skill-attr { font-size:10px;color:var(--muted);min-width:28px; }
  .skill-bonus { font-size:11px;font-weight:800;color:var(--blue-light);min-width:30px;text-align:right; }
  .skill-expert { font-size:9px;color:var(--yellow);min-width:16px;text-align:center; }

  /* ── RESISTÊNCIAS ── */
  .resist-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:4px; }
  .resist-row { display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;background:var(--surface); }
  .resist-row input[type="checkbox"] { accent-color:var(--blue-light);width:14px;height:14px;cursor:pointer;flex-shrink:0; }
  .resist-name { flex:1;font-size:12px;font-weight:600; }
  .resist-bonus { font-size:11px;font-weight:800;color:var(--blue-light);min-width:30px;text-align:right; }

  /* ── CONDIÇÕES ── */
  .cond-grid { display:flex;flex-wrap:wrap;gap:6px; }
  .cond-chip { display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;background:var(--dark);color:var(--muted);user-select:none; }
  .cond-chip.active { border-color:transparent;color:#fff; }
  .cond-chip[data-c="Queimado"].active    { background:#B91C1C; }
  .cond-chip[data-c="Paralisado"].active  { background:#A16207; }
  .cond-chip[data-c="Envenenado"].active  { background:#6D28D9; }
  .cond-chip[data-c="Congelado"].active   { background:#0369A1; }
  .cond-chip[data-c="Dormindo"].active    { background:#374151; }
  .cond-chip[data-c="Confuso"].active     { background:#9D174D; }
  .cond-chip[data-c="Flinch"].active      { background:#92400E; }
  .cond-chip[data-c="Amedrontado"].active { background:#1E3A5F; }
  .cond-chip[data-c="Infectado"].active   { background:#065F46; }

  /* ── MOVES ── */
  .moves-table { width:100%;border-collapse:collapse;font-size:12px; }
  .moves-table th { background:var(--dark);color:var(--muted);font-size:9px;text-transform:uppercase;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border); }
  .moves-table td { padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:middle; }
  .moves-table tr:last-child td { border-bottom:none; }
  .moves-table tr:hover td { background:rgba(255,255,255,.02); }
  .moves-table input,.moves-table select { background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;outline:none;padding:2px 0;width:100%; }
  .moves-table input:focus,.moves-table select:focus { border-bottom-color:var(--blue-light); }
  .moves-table select { background:var(--dark);border-radius:3px;padding:2px; }
  .sm-input { width:44px !important;text-align:center; }

  /* ── TABS ── */
  .tabs { display:flex;gap:4px;margin-bottom:0;border-bottom:1px solid var(--border);padding-bottom:0; }
  .tab { padding:8px 16px;border-radius:8px 8px 0 0;background:var(--surface);border:1px solid var(--border);border-bottom:none;font-size:12px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s; }
  .tab.active { background:var(--card);color:var(--yellow); }
  .tab:hover:not(.active) { color:var(--text); }
  .tab-pane { display:none;padding-top:14px; }
  .tab-pane.active { display:block; }

  /* ── TIPO BADGE ── */
  .tipo-badge { display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin:2px; }

  /* ── SAVE / TOAST ── */
  .save-btn { position:fixed;bottom:24px;right:24px;background:var(--red);color:#fff;border:none;border-radius:50px;padding:12px 24px;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;box-shadow:0 4px 20px rgba(227,53,13,.5);transition:all .2s;z-index:100; }
  .save-btn:hover { background:var(--red-dark);transform:translateY(-2px); }
  .save-btn.saved { background:var(--green); }
  .toast { position:fixed;bottom:80px;right:24px;background:var(--green);color:#000;font-weight:800;padding:10px 20px;border-radius:8px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200; }
  .toast.show { opacity:1; }
  /* ── BOTÕES FLUTUANTES ── */
  .fab-group { position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;align-items:flex-end;gap:10px;z-index:100; }
  .fab { border:none;border-radius:50px;padding:12px 20px;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4); }
  .fab:hover { transform:translateY(-2px); }
  .fab-save   { background:var(--red);   color:#fff; box-shadow:0 4px 20px rgba(227,53,13,.5); }
  .fab-save.saved { background:var(--green); }
  .fab-export { background:var(--blue);  color:#fff; box-shadow:0 4px 16px rgba(42,117,187,.5); }
  .fab-import { background:#374151;      color:#fff; }
  .fab-import-label { border:none;border-radius:50px;padding:12px 20px;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4);background:#374151;color:#fff;display:inline-block; }
  .fab-import-label:hover { transform:translateY(-2px);background:#4B5563; }

  /* ── MISC ── */
  .empty-state { text-align:center;padding:60px 20px;color:var(--muted); }
  .empty-state h3 { font-family:'Press Start 2P',monospace;font-size:10px;color:var(--muted);margin-bottom:12px; }
  .notes-area { width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;padding:10px;outline:none;resize:vertical;min-height:120px; }
  .notes-area:focus { border-color:var(--blue-light); }
  .del-btn { background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;transition:all .15s; }
  .del-btn:hover { background:var(--red);color:#fff;border-color:var(--red); }
  .inline { display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap; }
  .info-box { background:rgba(42,117,187,.15);border:1px solid rgba(42,117,187,.4);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--blue-light);margin-bottom:10px; }
  .info-box strong { color:#fff; }

  /* ── MODAL ATRIBUTO ── */
  .attr-modal-overlay {
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
    z-index:500;align-items:center;justify-content:center;
  }
  .attr-modal-overlay.open { display:flex; }
  .attr-modal {
    background:var(--card);border:2px solid var(--yellow);border-radius:14px;
    padding:24px 28px;max-width:420px;width:90%;position:relative;
    box-shadow:0 8px 40px rgba(0,0,0,.6);animation:modalIn .2s ease;
  }
  @keyframes modalIn { from{transform:scale(.92);opacity:0} to{transform:scale(1);opacity:1} }
  .attr-modal-close {
    position:absolute;top:12px;right:14px;background:none;border:none;
    color:var(--muted);font-size:20px;cursor:pointer;line-height:1;
  }
  .attr-modal-close:hover { color:var(--text); }
  .attr-modal-name {
    font-family:'Press Start 2P',monospace;font-size:11px;color:var(--yellow);
    margin-bottom:6px;
  }
  .attr-modal-full { font-size:13px;font-weight:800;color:var(--text);margin-bottom:10px; }
  .attr-modal-desc { font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:14px; }
  .attr-modal-pericia-label {
    font-size:9px;font-weight:800;color:var(--blue-light);
    text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;
  }
  .attr-modal-pericia {
    display:flex;align-items:flex-start;gap:8px;
    background:var(--surface);border-radius:8px;padding:8px 12px;margin-bottom:6px;
  }
  .attr-modal-pericia .dot { color:var(--yellow);font-size:14px;margin-top:1px;flex-shrink:0; }
  .attr-modal-pericia .p-name { font-size:12px;font-weight:800;color:var(--text); }
  .attr-modal-pericia .p-desc { font-size:11px;color:var(--muted);margin-top:2px; }
  .attr-modal-note {
    background:rgba(42,117,187,.15);border:1px solid rgba(42,117,187,.4);
    border-radius:8px;padding:8px 12px;font-size:11px;color:var(--blue-light);
    margin-top:10px;line-height:1.6;
  }
  .attr-hint { font-size:9px;color:var(--muted);text-align:center;margin-top:6px;font-style:italic; }

  @media(max-width:700px){.attr-grid{grid-template-columns:repeat(3,1fr);}.skills-grid{grid-template-columns:1fr;}.sidebar{width:180px;}}
</style>
</head>
<body>




<!-- MODAL NÍVEL POKÉMON -->
<div id="pok-level-modal" class="attr-modal-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="attr-modal" style="max-width:500px;max-height:85vh;overflow-y:auto">
    <button class="attr-modal-close" onclick="document.getElementById('pok-level-modal').classList.remove('open')">✕</button>
    <div id="pok-level-panel-body"></div>
  </div>
</div>


<!-- MODAL CONDIÇÃO -->
<div id="cond-modal-overlay" class="attr-modal-overlay" onclick="if(event.target===this)closeCondModal()">
  <div class="attr-modal" style="max-width:480px;max-height:85vh;overflow-y:auto">
    <button class="attr-modal-close" onclick="closeCondModal()">✕</button>
    <div id="cond-modal-body"></div>
  </div>
</div>

<!-- MODAL NÍVEL -->
<div id="level-modal-overlay" class="attr-modal-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="attr-modal" style="max-width:500px;max-height:85vh;overflow-y:auto">
    <button class="attr-modal-close" onclick="document.getElementById('level-modal-overlay').classList.remove('open')">✕</button>
    <div id="level-unlock-panel"></div>
  </div>
</div>

<!-- MODAL LEVEL POKÉMON -->
<div id="pok-level-modal" class="attr-modal-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="attr-modal" style="max-width:500px;max-height:85vh;overflow-y:auto">
    <button class="attr-modal-close" onclick="document.getElementById('pok-level-modal').classList.remove('open')">✕</button>
    <div id="pok-modal-body"></div>
  </div>
</div>


<!-- MODAL CONDIÇÃO -->
<div id="cond-modal-overlay" class="attr-modal-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="attr-modal" style="max-width:480px;max-height:85vh;overflow-y:auto">
    <button class="attr-modal-close" onclick="document.getElementById('cond-modal-overlay').classList.remove('open')">✕</button>
    <div id="cond-modal-body"></div>
  </div>
</div>

<!-- MODAL ATRIBUTO -->
<div class="attr-modal-overlay" id="attr-modal-overlay" onclick="if(event.target===this)closeAttrModal()">
  <div class="attr-modal">
    <button class="attr-modal-close" onclick="closeAttrModal()">✕</button>
    <div id="attr-modal-body"></div>
  </div>
</div>

<header class="app-header">
  <div>
    <div class="app-title">Pokémon <span>Mundo Perfeito</span></div>
    <div class="app-title" style="font-size:7px;color:rgba(255,255,255,.7);margin-top:3px;">Gerenciador de Fichas RPG</div>
  </div>
  <div class="pokeball"></div>
</header>

<div class="app-body">
  <nav class="sidebar">
    <div class="sb-section">
      <div class="sb-label">⚡ Treinadores</div>
      <div id="trainer-list"></div>
      <button class="btn-add" onclick="createTrainer()">+ Novo Treinador</button>
    </div>
    <div class="sb-section">
      <div class="sb-label">🔴 Pokémon</div>
      <div id="pokemon-list"></div>
      <button class="btn-add g" onclick="createPokemon()">+ Novo Pokémon</button>
    </div>
  </nav>
  <main class="main" id="main">
    <div class="empty-state">
      <h3>Bem-vindo!</h3>
      <p style="margin-bottom:8px">Crie um Treinador ou Pokémon pelo painel lateral.</p>
      <p style="font-size:11px">Todos os dados são salvos automaticamente no navegador.</p>
    </div>
  </main>
</div>

<div class="fab-group">
  <button class="fab fab-save" id="save-btn" onclick="saveAll()">💾 Salvar</button>
  <button class="fab fab-export" onclick="exportarFicha()">📤 Exportar</button>
  <label class="fab-import-label" for="import-file-input">📥 Importar</label>
  <input type="file" id="import-file-input" accept=".json" style="display:none" onchange="importarFicha(this)">
</div>
<div class="toast" id="toast">✅ Dados salvos!</div>

<script>
// ── CONSTANTES ──────────────────────────────────────────────────────────
const ATTRS = ['FOR','DES','CON','INT','SAB','CAR'];
const ATTR_FULL = {FOR:'Força',DES:'Destreza',CON:'Constituição',INT:'Inteligência',SAB:'Sabedoria',CAR:'Carisma'};

// Perícias com atributo vinculado (livro PMP pág 39-42)
const PERICIAS = [
  {n:'Acrobacia',    a:'DES'}, {n:'Adestrar Animais', a:'SAB'},
  {n:'Arcanismo',    a:'INT'}, {n:'Atletismo',         a:'FOR'},
  {n:'Atuação',      a:'CAR'}, {n:'Enganação',         a:'CAR'},

// ── UTILITÁRIOS ─────────────────────────────────────────────────────────
const v = n => parseInt(n)||0;
const mod = n => Math.floor((v(n)-10)/2);
const fmod = n => { const m=mod(n); return (m>=0?'+':'')+m; };
const hpColor = p => p>0.5?'#22C55E':p>0.25?'#EAB308':'#EF4444';
const prof = lvl => NIVEL_PROF[Math.min(20,Math.max(1,v(lvl)))];

// ── CUSTO DE PONTO DE ATRIBUTO (point buy PMP) ──────────────────────────
// Valores 8-13: 1pt por nível; 14: +2; 15: +2
function attrCost(val) {
  const n = v(val);
  if(n<=8) return 0;
  let c=0;
  for(let i=9;i<=n;i++) c += (i<=13)?1:2;
  return c;
}
function totalPts(attrs) { return Object.values(attrs).reduce((s,v)=>s+attrCost(v),0); }

function loadData() {
  const r=localStorage.getItem('pmp_db');
  if(r) try{
    db=JSON.parse(r);
    // migrar fichas antigas: atributos que eram 10 (padrão errado) voltam para 8
    Object.values(db.trainers||{}).forEach(t=>{
      if(t.atributos) {
        const ATTRS_LIST=['FOR','DES','CON','INT','SAB','CAR'];
        ATTRS_LIST.forEach(a=>{ if(!t.atributos[a]||t.atributos[a]==='10'||t.atributos[a]===10) t.atributos[a]=8; });
      }
    });
  }catch(e){}
}
function saveAll() {
  collectForm();
  localStorage.setItem('pmp_db',JSON.stringify(db));
  const b=document.getElementById('save-btn');
  b.classList.add('saved'); b.textContent='✅ Salvo!';
  setTimeout(()=>{b.classList.remove('saved');b.textContent='💾 Salvar';},1500);

}

// ── COLLECT FORM ─────────────────────────────────────────────────────────
function collectForm(){
  if(!curId) return;
  const panel=document.getElementById('main');
  const target=curType==='trainer'?db.trainers[curId]:db.pokemon[curId];
  if(!target) return;
  panel.querySelectorAll('[data-f]').forEach(el=>{
    const f=el.dataset.f;
    const val=el.type==='checkbox'?el.checked:el.value;
    if(f.startsWith('attr_')){
      const a=f.replace('attr_','');
      if(!target.atributos) target.atributos={};
      target.atributos[a]=val;
    } else if(f.startsWith('move_')){
      const [,i,k]=f.split('_');
      if(!target.moves[i]) target.moves[i]={};
      target.moves[i][k]=el.type==='checkbox'?el.checked:val;
    } else if(f.startsWith('per_')){
      const pn=f.replace('per_','');
      if(!target.pericias) target.pericias={};
      target.pericias[pn]=el.checked;
    } else if(f.startsWith('exp_')){
      const pn=f.replace('exp_','');
      if(!target.especialista) target.especialista={};
      target.especialista[pn]=el.checked;
    } else if(f.startsWith('res_')){
      const rn=f.replace('res_','');
      if(!target.resistencias) target.resistencias=[];
      if(el.checked){ if(!target.resistencias.includes(rn)) target.resistencias.push(rn); }
      else target.resistencias=target.resistencias.filter(r=>r!==rn);
    } else if(f.startsWith('stage_')){
      const sn=f.replace('stage_','');
      if(!target.stages) target.stages={};
      target.stages[sn]=val;
    } else {
      target[f]=val;
    }
  });
}

  collectForm(); curId=id; curType=type;

  if(type==='trainer') panel.innerHTML=renderTrainer(db.trainers[id]);
  else panel.innerHTML=renderPokemon(db.pokemon[id]);
  attachListeners();
}

function calcHP(t){
  // PV lv1 = 10 + modCON; cada nível seguinte = +2+modCON
  const lvl=Math.min(20,Math.max(1,v(t.nivel)));
  const mCON=mod(t.atributos.CON);
  const base=10+mCON;
  const extra=(lvl-1)*Math.max(1,2+mCON);
  return Math.max(1, base+extra);
}
function calcCA_trainer(t){ return 10+mod(t.atributos.DES); }

function renderDerived(t){
  const lvl=v(t.nivel);
  const pr=prof(lvl);
  const hpMax=calcHP(t);
  const ca=calcCA_trainer(t);
  const mCON=mod(t.atributos.CON);
  const mDES=mod(t.atributos.DES);
  return `
    <div class="derived-box"><div class="d-label">HP Máximo</div><div class="d-val">${hpMax}</div><div class="d-formula">10+modCON + (Nv-1)×(2+modCON)</div></div>
    <div class="derived-box"><div class="d-label">Dado de Vida</div><div class="d-val">d8</div><div class="d-formula">${lvl}d8</div></div>
    <div class="derived-box"><div class="d-label">CA</div><div class="d-val">${ca}</div><div class="d-formula">10 + modDES(${fmod(t.atributos.DES)})</div></div>
    <div class="derived-box"><div class="d-label">Prof.</div><div class="d-val">+${pr}</div><div class="d-formula">nível ${lvl}</div></div>
    <div class="derived-box"><div class="d-label">Iniciativa</div><div class="d-val">${fmod(t.atributos.DES)}</div><div class="d-formula">modDES</div></div>
    <div class="derived-box"><div class="d-label">Velocidade</div><div class="d-val">${t.velocidade||'9m'}</div><div class="d-formula">padrão 9m</div></div>
  `;
}
function getPtsMsg(rem){
  if(rem>0)   return `<span style="color:var(--yellow)">▲ ${rem} ponto${rem>1?'s':''} sobrando</span>`;
  if(rem===0) return `<span style="color:var(--green)">✓ Distribuição completa!</span>`;
  return `<span style="color:var(--red)">✗ Excedeu ${Math.abs(rem)} ponto${Math.abs(rem)>1?'s':''}! Reduza um atributo.</span>`;
}

        <select data-f="move_${i}_cat" onchange="saveAll()"

          ${['Físico','Especial','Status'].map(c=>`<option style="background:var(--dark);color:var(--text)"${m.cat===c?' selected':''}>${c}</option>`).join('')}

  const stages=['Ataque','Defesa','AtEsp','DefEsp','Velocidade','Acurácia','Evasão'];

  return `<div>

// ── LISTENERS & INTERATIVIDADE ────────────────────────────────────────────
function renderClasseCard(nome, lvl){
  const c=CLASSE_DATA[nome]; if(!c) return '';
  const niveisOrdenados=Object.entries(c.niveis).sort((a,b)=>a[0]-b[0]);
  return `<div style="background:var(--surface);border:2px solid var(--blue-light);border-radius:12px;padding:14px 16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span style="font-size:26px">${c.emoji}</span>
      <div>
        <div style="font-size:15px;font-weight:800;color:var(--blue-light)">${nome}</div>
        <div style="font-size:11px;color:var(--muted)">${c.desc}</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${niveisOrdenados.map(([nv,h])=>{
        const desbloqueado=lvl>=parseInt(nv);
        return `<div style="background:var(--dark);border-radius:8px;padding:10px 12px;border-left:3px solid ${desbloqueado?'var(--green)':'var(--border)'}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-family:'Press Start 2P',monospace;font-size:8px;background:${desbloqueado?'var(--green)':'var(--border)'};color:${desbloqueado?'#000':'var(--muted)'};padding:2px 6px;border-radius:4px">Nv.${nv}</span>
            <span style="font-size:12px;font-weight:800;color:${desbloqueado?'var(--text)':'var(--muted)'}">${h.nome}</span>
            ${desbloqueado?'<span style="font-size:9px;color:var(--green)">✓ Desbloqueado</span>':'<span style="font-size:9px;color:var(--muted)">🔒 Bloqueado</span>'}
          </div>
          <div style="font-size:11px;color:${desbloqueado?'var(--blue-light)':'var(--muted)'}">${h.texto}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}
function clearSelecao(tipo){
  const ids = {
    classe:  { inp:'classe-input',  sel:'classe-selected',  btn:'classe-toggle-btn',  grid:'classe-grid',  field:'classe',  empty:'Nenhuma classe selecionada — disponível a partir do nível 2' },
    regiao:  { inp:'regiao-input',  sel:'regiao-selected',  btn:'regiao-toggle-btn',  grid:'regiao-grid',  field:'regiao',  empty:'Nenhuma região selecionada — escolha uma abaixo' },
    origem:  { inp:'origem-input',  sel:'origem-selected',  btn:'origem-toggle-btn',  grid:'origem-grid',  field:'origem',  empty:'Nenhuma origem selecionada — escolha uma abaixo' },
    espec:   { inp:'espec-input',   sel:'espec-selected',   btn:'espec-toggle-btn',   grid:'espec-grid',   field:'especializacao', empty:'Nenhuma especialização selecionada — escolha uma abaixo' },
  };
  const d=ids[tipo]; if(!d) return;

  // limpa input hidden
  const inp=document.getElementById(d.inp); if(inp) inp.value='';

  // limpa card selecionado
  const sel=document.getElementById(d.sel);
  if(sel) sel.innerHTML=`<div style="background:var(--surface);border:2px dashed var(--border);border-radius:10px;padding:12px;text-align:center;color:var(--muted);font-size:12px">${d.empty}</div>`;

  // reseta bordas dos cards da grade
  document.querySelectorAll('.'+tipo+'-card, .espec-card').forEach(c=>{
    c.style.border='2px solid var(--border)';
    c.style.background='var(--surface)';
  });

  // abre a grade e reseta botão
  const grid=document.getElementById(d.grid); if(grid) grid.style.display='grid';
  const btn=document.getElementById(d.btn); if(btn) btn.textContent='▼ Escolher '+(tipo==='espec'?'especialização':tipo);

  // salva no db
  if(curId&&curType==='trainer'&&db.trainers[curId]) db.trainers[curId][d.field]='';
  saveAll();
}
function toggleClasseGrid(){

function selectClasse(nome){
  const inp=document.getElementById('classe-input'); if(inp) inp.value=nome;
  const lvlEl=document.querySelector('[data-f="nivel"]');
  const lvl=parseInt(lvlEl?lvlEl.value:1)||1;

  const sel=document.getElementById('classe-selected');
  if(sel) sel.innerHTML=renderClasseCard(nome,lvl);

  document.querySelectorAll('.classe-card').forEach(c=>{
    const n=c.dataset.classe;
    c.style.border='2px solid '+(n===nome?'var(--blue-light)':'var(--border)');
    c.style.background=n===nome?'rgba(74,155,232,.15)':'var(--surface)';
  });

  const btn=document.getElementById('classe-toggle-btn');
  if(btn){
    btn.textContent='🔄 Trocar classe ▼';
    // garante botão Remover ao lado
    const wrap=btn.parentElement;
    if(wrap&&!wrap.querySelector('.remove-btn-classe')){
      const rb=document.createElement('button');
      rb.className='remove-btn-classe';
      rb.onclick=()=>clearSelecao('classe');
      rb.style.cssText='background:var(--surface);border:1px solid var(--red);border-radius:8px;color:var(--red);font-family:Nunito,sans-serif;font-size:12px;font-weight:700;padding:8px 14px;cursor:pointer;white-space:nowrap';
      rb.textContent='✕ Remover';
      wrap.appendChild(rb);
    }
  }
  const grid=document.getElementById('classe-grid'); if(grid) grid.style.display='none';
  saveAll();
}
function checkPokemonLevelUp(pid, newVal) {
  const p = db.pokemon[pid]; if(!p) return;
  const oldLvl = parseInt(p.nivel)||1;
  const newLvl = parseInt(newVal)||1;
  if(newLvl > oldLvl) {
    p.nivel = newLvl;
    setTimeout(()=>showPokemonLevelPanel(pid), 100);
  }
}
function updatePokemonProgPanel(pid) {
  if(curId !== pid || curType !== 'pokemon') return;
  const p = db.pokemon[pid]; if(!p) return;
  // coleta valores atuais
  const dado = document.getElementById('pok-dado-'+pid);
  const estagios = document.getElementById('pok-estagios-'+pid);
  const conmod = document.getElementById('pok-conmod-'+pid);
  const nivelEl = document.querySelector('[data-f="nivel"]');
  if(dado) p.dadoVida = dado.value;
  if(estagios) p.estagios = parseInt(estagios.value);
  if(conmod) p.conMod = parseInt(conmod.value)||0;
  if(nivelEl) p.nivel = parseInt(nivelEl.value)||1;
  const panel = document.getElementById('pok-prog-panel-'+pid);
  if(panel) panel.innerHTML = renderPokemonLevelPanel(p);
  saveAll();
}
function setLealdade(pid, valor){
  valor = Math.max(-3, Math.min(3, parseInt(valor)));
  const inp = document.getElementById('leal-input-'+pid); if(inp) inp.value = valor;
  const card = document.getElementById('leal-card-'+pid);
  if(card) card.innerHTML = renderLealdadeCard(valor);
  // atualiza dots
  LEALDADE_DATA.forEach(l=>{
    const dot = document.getElementById(`leal-dot-${pid}-${l.valor}`);
    if(dot){
      dot.style.border = `2px solid ${l.valor===valor?l.cor:'var(--border)'}`;
      dot.style.background = l.valor===valor ? l.cor+'33' : 'var(--surface)';
    }
  });
  if(curId&&curType==='pokemon'&&db.pokemon[curId]) db.pokemon[curId].lealdade = valor;
  saveAll();
}
function adjustLealdade(pid, delta){
  const inp = document.getElementById('leal-input-'+pid);
  const cur = parseInt(inp?.value)||0;
  setLealdade(pid, cur + delta);
}

function recalc(){
  if(curType!=='trainer') return;
  const t=db.trainers[curId]; if(!t) return;
  // coleta atributos atuais da tela
  ATTRS.forEach(a=>{ const el=document.querySelector(`[data-f="attr_${a}"]`); if(el) t.atributos[a]=el.value; });
  const lvlEl=document.querySelector('[data-f="nivel"]');
  const oldNivel = parseInt(t.nivel)||1;
  if(lvlEl) t.nivel=lvlEl.value;
  // Se subiu de nível, abre o painel automaticamente
  const newNivel = parseInt(t.nivel)||1;
  if(newNivel > oldNivel) showLevelPanel();
  // re-renderiza card de classe quando nível muda (para atualizar desbloqueios)
  const classeInp=document.getElementById('classe-input');
  const classeSel=document.getElementById('classe-selected');
  if(classeInp&&classeSel&&classeInp.value&&CLASSE_DATA[classeInp.value]){
    classeSel.innerHTML=renderClasseCard(classeInp.value, parseInt(t.nivel)||1);
  }
  const pr=prof(v(t.nivel));

  // aviso sobre limites point-buy
  const warnings=[]; const spent=totalPts(t.atributos); const rem=27-spent;
  ATTRS.forEach(a=>{ if(v(t.atributos[a])>15) warnings.push(`⚠ ${a} acima de 15 (máximo antes de bônus de Região).`); if(v(t.atributos[a])<8) warnings.push(`⚠ ${a} abaixo de 8 (mínimo permitido).`); });

  const wEl=document.getElementById('attr-warnings'); if(wEl) wEl.innerHTML=warnings.join('<br>');

  // atualiza modificadores e custo por atributo
  ATTRS.forEach(a=>{
    const mEl=document.getElementById(`mod_${a}`); if(mEl) mEl.textContent=fmod(t.atributos[a]);
    const cEl=document.getElementById(`cost_${a}`); if(cEl) cEl.textContent=`custo: ${attrCost(t.atributos[a])}pt`;
  });

  // atualiza contador de pontos (novos IDs)
  const remEl=document.getElementById('pts-remaining');
  if(remEl){ remEl.textContent=rem; remEl.style.color=rem>0?'var(--yellow)':rem===0?'var(--green)':'var(--red)'; }
  const progEl=document.getElementById('pts-prog');
  if(progEl){ progEl.style.width=Math.max(0,Math.min(100,(spent/27)*100))+'%'; progEl.style.background=rem<0?'var(--red)':rem===0?'var(--green)':'var(--blue-light)'; }
  const lblEl=document.getElementById('pts-spent-lbl'); if(lblEl) lblEl.textContent=`${spent} gastos`;
  const msgEl=document.getElementById('pts-msg'); if(msgEl) msgEl.innerHTML=getPtsMsg(rem);

  // atualiza perícias
  PERICIAS.forEach(p=>{
    const chk=document.querySelector(`[data-f="per_${p.n}"]`);
    const expChk=document.querySelector(`[data-f="exp_${p.n}"]`);
    const bonEl=document.getElementById(`skb_${p.n.replace(/ /g,'_')}`);
    if(!chk||!bonEl) return;
    const isPro=chk.checked; const isExp=expChk&&expChk.checked;
    const b=mod(t.atributos[p.a])+(isPro?(isExp?pr*2:pr):0);
    bonEl.textContent=(b>=0?'+':'')+b;
    if(expChk) expChk.disabled=!isPro;
  });

  // atualiza resistências
  ATTRS.forEach(a=>{
    const chk=document.querySelector(`[data-f="res_${a}"]`);
    const bonEl=document.getElementById(`rsb_${a}`);
    if(!chk||!bonEl) return;
    const b=mod(t.atributos[a])+(chk.checked?pr:0);
    bonEl.textContent=(b>=0?'+':'')+b;
  });

  // atualiza derivadas
  const dEl=document.getElementById('derived-grid'); if(dEl) dEl.innerHTML=renderDerived(t);

  // atualiza barra de HP
  const hpMax=calcHP(t);
  const hpMaxDisp=document.getElementById('hp-max-disp'); if(hpMaxDisp) hpMaxDisp.textContent=hpMax;
  const hpCurEl=document.querySelector('[data-f="hpAtual"]');
  const bar=document.getElementById('hp-bar');
  if(bar&&hpCurEl){ const pct=Math.max(0,Math.min(1,v(hpCurEl.value)/hpMax)); bar.style.width=(pct*100)+'%'; bar.style.background=hpColor(pct); }

  // atualiza card de HP stats (dado de vida, HP máx)
  const hpStatsEl=document.getElementById('hp-stats-grid');
  if(hpStatsEl) hpStatsEl.innerHTML=renderHPStats(t, hpMax, pr);

  // atualiza card de bônus de proficiência ao vivo
  const profCardEl=document.getElementById('prof-card-body');

function adjustHP(sinal){
  const delta = parseInt(document.getElementById('hp-delta')?.value)||0;
  if(!delta) return;
  const inp = document.querySelector('[data-f="hpAtual"]'); if(!inp) return;
  const hpMaxDisp = document.getElementById('hp-max-disp');
  const maxVal = parseInt(hpMaxDisp?.textContent)||1;
  const cur = parseInt(inp.value)||0;
  const novo = Math.max(0, Math.min(maxVal, cur + sinal*delta));
  inp.value = novo;
  updateBar(inp, 'hp-bar', maxVal);
  if(curId&&curType==='trainer'&&db.trainers[curId]) db.trainers[curId].hpAtual = novo;
  saveAll();
}
function updateBar(input,barId,maxVal){
  const bar=document.getElementById(barId); if(!bar) return;
  const pct=Math.max(0,Math.min(1,v(input.value)/Math.max(1,v(maxVal))));
  bar.style.width=(pct*100)+'%'; bar.style.background=hpColor(pct);
}

function toggleCond(el,entityType){
  el.classList.toggle('active');
  collectForm();
  const target=entityType==='trainer'?db.trainers[curId]:db.pokemon[curId];
  if(!target) return;
  const c=el.dataset.c;
  if(!target.condicoes) target.condicoes=[];
  if(el.classList.contains('active')){ if(!target.condicoes.includes(c)) target.condicoes.push(c); }
  else target.condicoes=target.condicoes.filter(x=>x!==c);
  saveAll();
}

function updatePPBar(input, idx) {
  const bar = document.getElementById('pp-bar-'+idx); if(!bar) return;
  const row = input.closest('div[style*="border-radius:8px"]');
  const ppEl  = row?.querySelector('[data-f="move_'+idx+'_pp"]');
  const maxEl = row?.querySelector('[data-f="move_'+idx+'_ppMax"]');
  const cur = parseInt(ppEl?.value)||0;
  const max = parseInt(maxEl?.value)||1;
  const pct = Math.max(0,Math.min(1,cur/max));
  const cor = pct>0.5?'#22C55E':pct>0.25?'#EAB308':'#EF4444';
  bar.style.width = (pct*100)+'%';
  bar.style.background = cor;
  if(ppEl) ppEl.style.borderBottomColor = cor;
}
function removeMove(idx) {
  collectForm();
  const p = db.pokemon[curId]; if(!p||!p.moves) return;
  p.moves.splice(idx,1);
  saveAll();
  openSheet('pokemon', curId);
}
function addMove(){
  collectForm();
  const p=db.pokemon[curId]; if(!p) return;
  if(!p.moves) p.moves=[];
  p.moves.push({nome:'',tipo:'Normal',cat:'Físico',pp:0,ppMax:0,poder:'',alcance:'',desc:''});
  openSheet('pokemon',curId);
}

  11:82000, 12:104000, 13:128000, 14:158000, 15:194000, 16:234000, 17:278000,
  18:326000, 19:382000, 20:450000

function calcPokemonHPGain(dadoVida, conMod) {
  const faces = {'d4':4,'d6':6,'d8':8,'d10':10,'d12':12};
  const dado = faces[dadoVida] || 8;
  return Math.floor(dado/2) + 1 + (parseInt(conMod)||0);
}

function getPokemonLevelFeatures(lvl, estagios) {
  estagios = parseInt(estagios)||3;
  const data = POKEMON_PROGRESSAO[lvl] || {prof:2,stab:'+0',features:[]};
  const features = [];

  // PV — todo nível
  features.push({ tipo:'pv', label:'Ganho de PV por nível', desc:'Média do dado de vida (metade+1) + mod CON. Ex: d10 → 6; com mod CON +2 → ganha 8 PV.' });

  // Features específicas do nível
  data.features.forEach(f => {
    if(f === 'Novo Move'){
      features.push({ tipo:'move', label:'Novo Move disponível', desc:`Aprenda qualquer Move do seu bloco de estatísticas de nível ${lvl} ou inferior. Máximo de 4 Moves simultâneos (sem Talento Extra). Trocas permitidas no descanso longo.` });
    }
    else if(f === 'Incremento no Valor de Atributo (ASI)'){
      const pts = estagios===1?4:estagios===2?3:2;
      features.push({ tipo:'asi', label:`ASI — Incremento de Atributo (+${pts} pontos)`, desc:`Distribua ${pts} pontos nos atributos (máximo 20 antes da Natureza). Alternativa: gaste 2 pts por 1 Talento. Apenas 1 Talento por ASI.` });
    }
    else if(f === 'Aumento de proficiência' || f === 'Aumento de proficiência/dano'){
      features.push({ tipo:'prof', label:`Bônus de Proficiência aumenta para +${data.prof}`, desc:`Agora +${data.prof} em ataques, perícias, resistências e CD dos Moves.` });
    }
    else if(f === 'Aumento de Dano dos Moves'){
      features.push({ tipo:'dano', label:'Dados de Dano dos Moves aumentam', desc:'Os dados de dano e cura de todos os seus Moves aumentam conforme descrito na ficha de cada Move.' });
    }
    else if(f === 'Aumento de STAB'){
      features.push({ tipo:'stab', label:`STAB aumenta para ${data.stab}`, desc:`Bônus de dano ao usar Moves do mesmo tipo que o Pokémon é agora ${data.stab} por ataque.` });
    }
  });

  return features;
}

        : `<div style="text-align:center;padding:10px;color:var(--muted);font-size:12px">Nenhuma feature especial neste nível além do ganho de PV e XP.</div>`}
      <!-- nível anterior -->
      ${prevData && prevData.features.length ? `
        <div style="font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">📋 Nível ${lvl-1} (anterior)</div>

}

function showPokemonLevelPanel(pid) {

// Tabela de XP por nível do Pokémon
const POKEMON_FEATURE_CORES = {
  pv:   { cor:'#EF4444', emoji:'❤️' },
  move: { cor:'#3B82F6', emoji:'⚡' },
  asi:  { cor:'#A855F7', emoji:'⬆️' },
  dano: { cor:'#F97316', emoji:'💥' },
  stab: { cor:'#EAB308', emoji:'⭐' },
  prof: { cor:'#22C55E', emoji:'📈' },
};

function renderPokemonLevelBadge(p, lvl) {
  const data = POKEMON_PROGRESSAO[lvl]; if(!data) return '';
  const dadoVida = p.dadoVida||'d8';
  const conMod = parseInt(p.conMod)||0;
  const faces = {'d4':4,'d6':6,'d8':8,'d10':10,'d12':12};
  const dado = faces[dadoVida]||8;
  const pvGain = Math.floor(dado/2)+1+conMod;
  const estagios = parseInt(p.estagios)||3;
  const xpNecessario = POKEMON_XP[lvl]||0;
  const xpNext = POKEMON_XP[lvl+1]||null;

  // features do nível — sempre inclui ganho de PV
  const allFeatures = [
    { tipo:'pv', label:`Ganho de PV: +${pvGain}`, desc:`Média de ${dadoVida} (=${Math.floor(dado/2)+1}) + mod CON (${conMod>=0?'+':''}${conMod}) = ${pvGain} PV.` },
    ...data.features,
  ];

  // se ASI, mostrar pontos corretos
  const asiFeature = allFeatures.find(f=>f.tipo==='asi');
  if(asiFeature){
    const pts = estagios===1?4:estagios===2?3:2;
    asiFeature.label = `Incremento no Valor de Atributo (+${pts} pts)`;
    asiFeature.desc = `${pts} pontos para distribuir (${estagios} estágio${estagios>1?'s':''} evolutivo${estagios>1?'s':''}). Máximo 20 por atributo. Você pode gastar 2 pts num Talento.`;
  }

  return `
    <div style="background:var(--dark);border:2px solid var(--green);border-radius:12px;padding:14px 16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
        <div style="background:var(--green);color:#000;font-family:'Press Start 2P',monospace;font-size:9px;padding:5px 10px;border-radius:6px;flex-shrink:0">
          NV. ${lvl}
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <span style="background:var(--surface);border:1px solid var(--border);border-radius:5px;font-size:9px;font-weight:800;padding:3px 7px;color:var(--muted)">
            Prof <span style="color:var(--yellow)">+${data.prof}</span>
          </span>
          <span style="background:var(--surface);border:1px solid var(--border);border-radius:5px;font-size:9px;font-weight:800;padding:3px 7px;color:var(--muted)">
            STAB <span style="color:var(--yellow)">${data.stab}</span>
          </span>
          <span style="background:var(--surface);border:1px solid var(--border);border-radius:5px;font-size:9px;font-weight:800;padding:3px 7px;color:var(--muted)">
            XP <span style="color:var(--blue-light)">${xpNecessario.toLocaleString('pt-BR')}</span>
          </span>
          ${xpNext?`<span style="background:var(--surface);border:1px solid var(--border);border-radius:5px;font-size:9px;font-weight:800;padding:3px 7px;color:var(--muted)">
            Próx. <span style="color:var(--muted)">${xpNext.toLocaleString('pt-BR')}</span>
          </span>`:''}
        </div>
      </div>
      ${allFeatures.length ? `<div style="display:flex;flex-direction:column;gap:5px">
        ${allFeatures.map(f=>{
          const meta = POKEMON_FEATURE_CORES[f.tipo]||{cor:'var(--blue-light)',emoji:'◆'};
          return `<div style="background:var(--surface);border-left:3px solid ${meta.cor};border-radius:0 8px 8px 0;padding:9px 12px">
            <div style="font-size:12px;font-weight:800;color:${meta.cor};margin-bottom:3px">${meta.emoji} ${f.label}</div>
            <div style="font-size:11px;color:var(--muted);line-height:1.5">${f.desc}</div>
          </div>`;
        }).join('')}
      </div>` : `<div style="font-size:11px;color:var(--muted);padding:8px">Nenhuma feature especial neste nível além do ganho de PV.</div>`}
    </div>
  `;
}

function showPokemonLevelPanel(pid) {
  const p = db.pokemon[pid]; if(!p) return;
  const lvl = parseInt(p.nivel)||1;
  const prevLvl = lvl > 1 ? lvl - 1 : null;
  const panel = document.getElementById('pok-level-panel-body');
  if(!panel) return;
  panel.innerHTML = `
    <div style="margin-bottom:10px">
      <div style="font-size:9px;color:var(--green);font-family:'Press Start 2P',monospace;margin-bottom:8px">🔓 DESBLOQUEADO NO NÍVEL ${lvl}</div>
      ${renderPokemonLevelBadge(p, lvl)}
      ${prevLvl ? `
        <div style="font-size:9px;color:var(--muted);font-family:'Press Start 2P',monospace;margin:10px 0 8px">📋 NÍVEL ${prevLvl} (anterior)</div>
        <div style="opacity:.55">${renderPokemonLevelBadge(p, prevLvl)}</div>
      ` : ''}
    </div>
    <button onclick="document.getElementById('pok-level-modal').classList.remove('open')"
      style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:8px;cursor:pointer">
      Fechar
    </button>
  `;
  document.getElementById('pok-level-modal').classList.add('open');
}

  const corTipo = isHumano ? 'var(--blue-light)' : 'var(--green)';

  document.getElementById('cond-modal-body').innerHTML = `

        ${data.tipo ? `<div style="margin-top:4px;display:flex;gap:6px">
          <span style="background:${isVol?'#1E3A5F':isNV?'#3F1F1F':'#1F3F2F'};color:${isVol?'#7DD3FC':isNV?'#FCA5A5':'#86EFAC'};border-radius:6px;font-size:10px;font-weight:800;padding:2px 8px">${data.tipo}</span>

      <div style="font-size:9px;color:var(--yellow);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">⚔️ Efeitos</div>
      ${data.efeitos.map(e=>`
        <div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:var(--text);line-height:1.5">

  document.getElementById('cond-modal-overlay').classList.add('open');
}

function renderTalentoModal(nome) {
  const t = TALENTOS_DATA.find(t=>t.nome===nome);
  if(!t) return;
  const quemMap = {'T':'👤 Treinador','P':'🔴 Pokémon','TP':'👤🔴 Treinador & Pokémon'};
  document.getElementById('cond-modal-body').innerHTML = `
    <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:14px">
      <div style="background:${t.cor}22;border:2px solid ${t.cor};border-radius:10px;padding:8px 12px;flex-shrink:0;text-align:center;min-width:60px">
        <div style="font-size:18px">${t.quem==='T'?'👤':t.quem==='P'?'🔴':'👤🔴'}</div>
        <div style="font-size:9px;color:${t.cor};font-weight:800;margin-top:2px">${t.quem==='T'?'Treinador':t.quem==='P'?'Pokémon':'Ambos'}</div>
      </div>
      <div style="flex:1">
        <div style="font-size:16px;font-weight:800;color:${t.cor};margin-bottom:4px">${t.nome}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px">${t.desc}</div>
        ${t.req!=='—'?`<div style="background:var(--dark);border-radius:6px;padding:4px 10px;font-size:10px;color:var(--yellow);font-weight:700;display:inline-block">⚠️ Pré-requisito: ${t.req}</div>`:''}
      </div>
    </div>
    <div style="background:var(--dark);border-radius:10px;padding:12px 14px">
      <div style="font-size:9px;color:var(--yellow);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">✦ Efeitos</div>
      ${t.efeitos.map(e=>`
        <div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:var(--text);line-height:1.5">
          <span style="color:${t.cor};flex-shrink:0;margin-top:2px">◆</span><span>${e}</span>
        </div>`).join('')}
    </div>
  `;
  document.getElementById('cond-modal-overlay').classList.add('open');
}

// Agrupa por categoria
function getLojaCategorias() {
  const cats = {};
  LOJA_ITENS.forEach(item => {
    if(!cats[item.cat]) cats[item.cat] = [];
    cats[item.cat].push(item);
  });
  return cats;
}

let lojaAberta = false;
let lojaFiltro = '';
let lojaCat = '';

function toggleLoja() {
  lojaAberta = !lojaAberta;
  renderInventarioPanel();
}

function addItemInventario(nome, preco, qtd) {
  qtd = parseInt(qtd)||1;
  if(!curId || curType !== 'trainer') return;
  const t = db.trainers[curId]; if(!t) return;
  if(!t.inventario) t.inventario = [];
  // Verifica se já existe
  const ex = t.inventario.find(i=>i.nome===nome);
  if(ex) { ex.qtd += qtd; }
  else { t.inventario.push({ nome, preco, qtd }); }
  // Desconta dinheiro
  t.dinheiro = Math.max(0, (parseInt(t.dinheiro)||0) - preco*qtd);
  saveAll();
  renderInventarioPanel();
}

function removeItemInventario(idx) {
  const t = db.trainers[curId]; if(!t||!t.inventario) return;
  t.inventario.splice(idx, 1);
  saveAll();
  renderInventarioPanel();
}

function ajustarQtdItem(idx, delta) {
  const t = db.trainers[curId]; if(!t||!t.inventario) return;
  t.inventario[idx].qtd = Math.max(0, (t.inventario[idx].qtd||1) + delta);
  if(t.inventario[idx].qtd === 0) t.inventario.splice(idx, 1);
  saveAll();
  renderInventarioPanel();
}

function renderInventarioPanel() {

    (!lojaCat || i.cat === lojaCat) &&

            style="width:110px;background:transparent;border:none;border-bottom:2px solid var(--yellow);color:var(--yellow);font-family:'Press Start 2P',monospace;font-size:16px;text-align:center;outline:none;padding:2px 0">
        </div>
      </div>
      <div style="flex:1;font-size:11px;color:var(--muted);line-height:1.8">
        <strong style="color:var(--text)">Valor total no inventário:</strong> ₽${totalInventario.toLocaleString('pt-BR')}<br>
        <strong style="color:var(--text)">Dinheiro inicial:</strong> ₽1.000 + ₽100 × 4d4 &nbsp;·&nbsp;
        <span style="color:var(--green)">Mín ₽1.400 · Máx ₽2.600</span>
      </div>
    </div>

    <!-- INVENTÁRIO ATUAL -->
    <div style="font-size:10px;font-weight:800;color:var(--blue-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">🎒 Inventário Atual</div>
    ${t.inventario.length === 0
      ? `<div style="background:var(--dark);border-radius:8px;padding:16px;text-align:center;color:var(--muted);font-size:12px;margin-bottom:14px">Inventário vazio — adicione itens pela loja abaixo</div>`

            <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px">

              </div>

    <!-- LOJA -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">

        <select onchange="lojaCat=this.value;renderInventarioPanel()"

      ${lojaCat === '💉 Vitaminas' ? `
      <div style="background:#EF444422;border:1px solid #EF4444;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:11px;color:#FCA5A5;line-height:1.6">
        💉 <strong>Regra de Vitaminas:</strong> máximo de <strong>3 vitaminas no total</strong> por Pokémon (qualquer combinação).
        O Pokémon recusará qualquer vitamina adicional após as 3 primeiras.

      ${lojaCat === '🌿 Hortelãs' ? `
      <div style="background:#16653422;border:1px solid #22C55E;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:11px;color:#86EFAC;line-height:1.6">
        🌿 <strong>Regra de Hortelãs:</strong> Alteram <strong>permanentemente</strong> a Natureza do Pokémon.
        A Natureza anterior é substituída pela nova, com todos os seus bônus e penalidades.
        Cada Hortelã custa <strong>₽5.000</strong>.

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:6px;max-height:400px;overflow-y:auto;padding-right:4px">
        ${filtrados.map(item => {
          const podeComprar = (parseInt(t.dinheiro)||0) >= item.preco;
          const isVest = item.cat === '👕 Vestimentas';
          return `<div style="background:var(--surface);border:1px solid ${isVest?'#A855F7':'var(--border)'};border-radius:8px;padding:8px 10px;display:flex;align-items:flex-start;gap:8px">

              <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center">
                <span style="font-size:11px;font-weight:800;color:var(--yellow)">₽${item.preco.toLocaleString('pt-BR')}</span>
                ${isVest ? `<span style="background:#A855F722;color:#A855F7;border:1px solid #A855F7;border-radius:4px;font-size:9px;font-weight:800;padding:1px 6px">${item.bonus}</span>` : ''}
              </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
              <button onclick="addItemInventario('${item.nome.replace(/'/g,"\\'")}',${item.preco},1)"

function addItemInventarioGratis(nome, preco, qtd) {
  qtd = parseInt(qtd)||1;
  const t = db.trainers[curId]; if(!t) return;
  if(!t.inventario) t.inventario = [];
  const ex = t.inventario.find(i=>i.nome===nome);
  if(ex) ex.qtd += qtd;
  else t.inventario.push({ nome, preco, qtd });
  saveAll();
  renderInventarioPanel();
}

// ── EXPORTAR / IMPORTAR ──────────────────────────────────────────────────
function exportarFicha() {
  collectForm();
  const nomeArquivo = (() => {
    // tenta pegar nome do treinador ou pokémon atual
    if(curId && curType==='trainer' && db.trainers[curId])
      return 'ficha_' + (db.trainers[curId].nome||'treinador').replace(/\s+/g,'_') + '.json';
    if(curId && curType==='pokemon' && db.pokemon[curId])
      return 'ficha_' + (db.pokemon[curId].nome||'pokemon').replace(/\s+/g,'_') + '.json';
    return 'ficha_pokemon_mundo_perfeito.json';
  })();

  const dados = { versao:'1.0', exportado: new Date().toISOString(), ...db };
  const blob = new Blob([JSON.stringify(dados, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nomeArquivo; a.click();
  URL.revokeObjectURL(url);

  // feedback visual
  const t = document.getElementById('toast');
  t.textContent = '📤 Exportado!';
  t.style.background = 'var(--blue)';
  t.classList.add('show');
  setTimeout(()=>{ t.classList.remove('show'); t.textContent='✅ Dados salvos!'; t.style.background='var(--green)'; }, 2500);
}

function importarFicha(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const dados = JSON.parse(e.target.result);
      // valida se é uma ficha PMP
      if(!dados.trainers && !dados.pokemon) {
        alert('❌ Arquivo inválido! Certifique-se de que é uma ficha exportada do Pokémon Mundo Perfeito.');
        return;
      }
      if(!confirm(`📥 Importar ficha?\n\nIsso vai SUBSTITUIR todos os dados atuais pelos dados do arquivo "${file.name}".\n\nTreinadores no arquivo: ${Object.keys(dados.trainers||{}).length}\nPokémon no arquivo: ${Object.keys(dados.pokemon||{}).length}\n\nDeseja continuar?`)) return;

      db = { trainers: dados.trainers||{}, pokemon: dados.pokemon||{} };
      localStorage.setItem('pmp_db', JSON.stringify(db));
      curId = null; curType = null;
      renderSidebar();
      document.getElementById('main').innerHTML = `
        <div class="empty-state">
          <h3>✅ Importado!</h3>
          <p style="margin-bottom:8px">Ficha de <strong style="color:var(--yellow)">${file.name}</strong> carregada com sucesso.</p>
          <p style="font-size:11px;color:var(--muted)">Selecione um Treinador ou Pokémon no painel lateral.</p>
        </div>`;

      const t = document.getElementById('toast');
      t.textContent = '📥 Importado com sucesso!';
      t.style.background = 'var(--blue)';
      t.classList.add('show');
      setTimeout(()=>{ t.classList.remove('show'); t.textContent='✅ Dados salvos!'; t.style.background='var(--green)'; }, 3000);
    } catch(err) {
      alert('❌ Erro ao ler o arquivo. Verifique se é um JSON válido.\n\n' + err.message);
    }
    input.value = ''; // reset input para permitir importar o mesmo arquivo de novo
  };
  reader.readAsText(file);
}

// ── INIT ──────────────────────────────────────────────────────────────────
loadData();
renderSidebar();
</script>
